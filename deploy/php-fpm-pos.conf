; POS ElevenOne — dedicated PHP-FPM pool.
;
; Install: sudo cp deploy/php-fpm-pos.conf /etc/php/8.2/fpm/pool.d/pos.conf
;          sudo systemctl reload php8.2-fpm
;
; A dedicated pool (rather than the shared `www` one) keeps a POS traffic spike
; from starving the other sites on this box — each pool has its own worker cap.
[pos]
user = www-data
group = www-data

listen = /run/php/php8.2-fpm-pos.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; `ondemand` matches the order-food pool: workers are spawned per request and
; reaped when idle, which matters on a 2 GB box shared with several sites.
; max_children 5 x 256M is the worst-case ceiling for this pool.
pm = ondemand
pm.max_children = 5
pm.process_idle_timeout = 10s
pm.max_requests = 500

php_admin_value[memory_limit] = 256M
catch_workers_output = yes

; Menu-item photos come straight off a phone camera; the global 2M/8M limits
; reject them. nginx's client_max_body_size is raised to match in the vhost.
php_admin_value[upload_max_filesize] = 8M
php_admin_value[post_max_size] = 10M

; Production: never stat files for changes. NOTE — this means a code deploy is
; not live until `sudo systemctl reload php8.2-fpm` runs.
php_admin_value[opcache.validate_timestamps] = 0
