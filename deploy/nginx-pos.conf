# POS ElevenOne — single-origin vhost (SPA + Laravel API on one hostname).
#
# Install: sudo cp deploy/nginx-pos.conf /etc/nginx/sites-available/pos
#          sudo ln -s /etc/nginx/sites-available/pos /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#          sudo certbot --nginx -d pos.system11.app   (adds the 443 block)
#
# Routing:
#   /            -> /var/www/pos-elevenone/frontend/dist   (Vite build output)
#   /api/...     -> /var/www/pos-elevenone/backend/public  (Laravel, pos FPM pool)
#   /storage/... -> uploaded menu images (public-disk symlink)
#
# /var/www/pos-elevenone is a git clone, so frontend/ holds SOURCE and the
# served files are the build output in frontend/dist — never point root at
# frontend/ itself or the repo's source tree becomes web-readable.
#
# Serving both from ONE origin is deliberate: the browser makes same-origin
# calls, so there is no CORS preflight and no mixed-content risk. If this is
# ever split into pos/api.pos subdomains, FRONTEND_URL and config/cors.php on
# the backend must be updated to match.
server {
    server_name pos.system11.app;

    root /var/www/pos-elevenone/frontend/dist;
    index index.html;

    charset utf-8;
    # Must be >= the pool's post_max_size (10M) so nginx doesn't reject
    # menu-photo uploads before PHP ever sees them.
    client_max_body_size 10M;

    # This vhost sits behind the Cloudflare proxy, so REMOTE_ADDR would be a
    # Cloudflare edge IP for every visitor. That would make the per-IP login
    # throttles on the /api credential endpoints a single shared bucket for
    # all users, and would fill the audit log with Cloudflare addresses.
    # Restoring the real client IP here fixes both.
    include snippets/cloudflare-realip.conf;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Laravel API ----
    location ^~ /api {
        root /var/www/pos-elevenone/backend/public;
        try_files $uri /index.php?$query_string;
    }

    # Framework health endpoint (bootstrap/app.php -> health: '/up').
    location = /up {
        root /var/www/pos-elevenone/backend/public;
        try_files $uri /index.php?$query_string;
    }

    # Uploaded menu images. Served straight off disk by nginx — these never
    # touch PHP. Filenames are hashed by Laravel's store(), so a long TTL is
    # safe: a replaced image gets a new name.
    location ^~ /storage/ {
        root /var/www/pos-elevenone/backend/public;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~ \.php$ {
        root /var/www/pos-elevenone/backend/public;
        # try_files first: without it, any /whatever.php path would be handed to
        # PHP-FPM for a file that does not exist.
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php8.2-fpm-pos.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ---- React SPA ----
    # Hashed build assets: safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must NEVER be cached. It is the only unhashed file in the build
    # and it is what maps the app to the current /assets/ hashes. `npm run build`
    # empties dist/, so a browser holding a stale index.html requests a bundle
    # that no longer exists -> 404 -> blank white page, and the user cannot
    # recover without a manual hard reload. Without this header nginx sends no
    # Cache-Control at all and browsers cache it heuristically off Last-Modified.
    #
    # add_header at this level DROPS the server-level add_headers, so the three
    # security headers are repeated here rather than inherited.
    #
    # The `location /` fallback below reaches this block too: try_files' fallback
    # is an internal redirect, which re-runs location matching.
    location = /index.html {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Block dotfiles (.env, .git, ...) except ACME challenges.
    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/pos.access.log;
    error_log  /var/log/nginx/pos.error.log;

    listen 80;
    listen [::]:80;
}
